name: Deploy Axiom FL Mapper

on:
  push:
    branches:
      - cursor/midi-keyboard-34ed
      - main
    paths:
      - 'midi-Keyboard/**'
      - '.github/workflows/deploy-axiom-mapper.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-axiom-mapper
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: midi-Keyboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: midi-Keyboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build:online

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: midi-Keyboard/dist
          commit_message: 'Deploy Axiom FL Mapper'
          enable_jekyll: false
